<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random recipe · hd · recipes</title>
<meta name="description" content="Pull a random recipe from hd · recipes — narrow by cuisine, protein, vibe, time, or difficulty.">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='14' fill='%23b8423a'/%3E%3Ctext x='50' y='62' text-anchor='middle' dominant-baseline='central' font-family='EB Garamond, serif' font-size='66' font-weight='700' fill='%23faf6ee'%3E?%3C/text%3E%3C%2Fsvg%3E">
<script>(function(){try{var t=localStorage.getItem('hdr-theme');if(t==='dark'||t==='light'){document.documentElement.setAttribute('data-theme',t);}else if(!t&&window.matchMedia('(prefers-color-scheme: dark)').matches){document.documentElement.setAttribute('data-theme','dark');}}catch(e){}})();</script>
<style>
  :root {
    --bg: #faf6ee; --bg-elev: #fffaf0; --ink: #2a1f10; --ink-soft: #5a4a36; --ink-faint: #8a7a60;
    --accent: #b8423a; --accent-soft: rgba(184, 66, 58, 0.18); --link: #1f5b8a;
    --rule: rgba(0,0,0,0.08);
  }
  [data-theme="dark"] {
    --bg: #15110a; --bg-elev: #1f1810; --ink: #f1ead8; --ink-soft: #c4b89b; --ink-faint: #a99878;
    --accent: #d75c52; --accent-soft: rgba(215, 92, 82, 0.28); --link: #6db1e6;
    --rule: rgba(255,255,255,0.1);
  }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif; min-height: 100vh; }
  main { min-height: 100vh; display: grid; place-items: start center; padding: 3rem 1.5rem 4rem; }
  .panel { width: min(720px, 100%); }
  .head { text-align: center; margin-bottom: 2rem; }
  .mark { font-size: 3.2rem; color: var(--accent); margin-bottom: .3rem; font-weight: 700; line-height: 1; }
  h1 { font-size: 2rem; margin: 0.4rem 0 0.5rem; font-weight: 600; }
  .lede { color: var(--ink-soft); font-size: 1.05rem; line-height: 1.5; margin: 0; }
  .filters { display: flex; flex-direction: column; gap: 1.15rem; margin: 0 0 1.6rem; }
  .filter-row { display: flex; flex-direction: column; gap: 0.45rem; }
  .filter-label {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.7rem; letter-spacing: 0.09em; text-transform: uppercase;
    color: var(--ink-faint);
    font-weight: 600;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
  .chip {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.85rem;
    padding: 0.42rem 0.85rem;
    border: 1px solid var(--rule);
    border-radius: 999px;
    background: var(--bg-elev);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 120ms;
    -webkit-tap-highlight-color: transparent;
  }
  .chip:hover { color: var(--ink); border-color: var(--ink-faint); }
  .chip.is-on {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .chip:disabled, .chip.is-disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }
  .actions {
    display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center;
    padding-top: 0.6rem;
    border-top: 1px solid var(--rule);
  }
  .btn {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 0.95rem;
    padding: 0.7rem 1.5rem;
    border: 0;
    border-radius: 999px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--rule);
  }
  .btn:hover:not(:disabled) { filter: brightness(1.05); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .status {
    margin-left: auto;
    color: var(--ink-faint);
    font-size: 0.88rem;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .status .count { color: var(--ink); font-weight: 600; }
  .back {
    display: inline-block; margin-top: 1.6rem;
    color: var(--ink-faint); font-size: 0.85rem; text-decoration: none;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .back:hover { color: var(--accent); }
  .loading { animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @media (prefers-reduced-motion: reduce) { .loading { animation: none; } }
  @media (max-width: 480px) {
    main { padding: 2rem 1rem 3rem; }
    h1 { font-size: 1.6rem; }
    .actions { flex-direction: column; align-items: stretch; }
    .status { margin-left: 0; text-align: center; }
    .btn { width: 100%; }
  }
</style>
</head>
<body>
<main>
  <div class="panel">
    <div class="head">
      <div class="mark" id="mark">?</div>
      <h1 id="heading">Random recipe</h1>
      <p class="lede" id="lede">Pulling a recipe…</p>
    </div>
    <div id="filter-ui" hidden>
      <div class="filters" id="filters"></div>
      <div class="actions">
        <button type="button" class="btn" id="go">Surprise me</button>
        <button type="button" class="btn btn-ghost" id="clear">Clear all</button>
        <span class="status" id="status"></span>
      </div>
    </div>
    <div style="text-align:center"><a class="back" href="index.html">← back to all recipes</a></div>
  </div>
</main>
<script>
(function () {
  'use strict';

  // ── Facet definitions ──────────────────────────────────────────────────
  // Each facet declares: how to extract values from a recipe and how a value
  // matches. Multi-select within a facet means OR; across facets it's AND.
  // Facets driven by tags inspect the tag set; "protein" derives from a small
  // controlled vocabulary so vegetarian/vegan can also live in this row.
  //
  // Some facets are dynamic (cuisine/course/diet) — values come from data.
  // Others are curated (protein/vibe/type/time/difficulty) — values pinned
  // here so the picker reads consistently regardless of which recipes ship.

  const PROTEIN_TAGS = ['chicken', 'pork', 'beef', 'lamb', 'turkey', 'fish', 'seafood', 'egg'];
  const VIBE_TAGS    = ['comfort', 'spicy', 'weeknight', 'weekend-project', 'holiday', 'no-cook', 'one-pot', 'make-ahead', 'freezer-friendly', 'pantry'];
  const TYPE_TAGS    = ['pasta', 'rice', 'noodles', 'bread', 'cake', 'cookies', 'soup', 'stir-fry', 'braise', 'sauce', 'snack', 'drink', 'side', 'salad', 'dessert', 'breakfast'];
  const DIFFICULTIES = ['easy', 'medium', 'hard'];
  const TIME_BUCKETS = [
    { label: '≤ 20 min', value: 20 },
    { label: '≤ 30 min', value: 30 },
    { label: '≤ 45 min', value: 45 },
    { label: '≤ 1 h',    value: 60 },
    { label: '≤ 1.5 h',  value: 90 },
  ];

  function tagSet(r) { return new Set(r.tags || []); }
  function dietSet(r) {
    if (!r.diet) return new Set();
    return new Set(Array.isArray(r.diet) ? r.diet : String(r.diet).split('|').filter(Boolean));
  }
  function activeMin(r) {
    return (r.time && (r.time.active_min || r.time.total_min)) || 0;
  }

  // Each facet: { key, label, multi, dynamic?, values? (sync), match(r, vals) }
  // - dynamic: values pulled from the actual data on init.
  // - multi:   true → multi-select, OR within facet.
  // - match:   given recipe r and selected Set, return true if r should pass.
  const FACETS = [
    {
      key: 'cuisine', label: 'Cuisine', multi: true, dynamic: 'cuisine',
      match: (r, vals) => !vals.size || vals.has(r.cuisine || ''),
    },
    {
      key: 'course', label: 'Course', multi: true, dynamic: 'course',
      match: (r, vals) => !vals.size || vals.has(r.course || ''),
    },
    {
      key: 'protein', label: 'Protein / base', multi: true,
      values: [...PROTEIN_TAGS, 'vegetarian', 'vegan'],
      match: (r, vals) => {
        if (!vals.size) return true;
        const tags = tagSet(r);
        const diet = dietSet(r);
        for (const v of vals) {
          if (v === 'vegetarian' || v === 'vegan') {
            if (diet.has(v)) return true;
          } else if (tags.has(v)) {
            return true;
          }
        }
        return false;
      },
    },
    {
      key: 'type', label: 'Type', multi: true, values: TYPE_TAGS,
      match: (r, vals) => {
        if (!vals.size) return true;
        const tags = tagSet(r);
        for (const v of vals) if (tags.has(v) || r.course === v) return true;
        return false;
      },
    },
    {
      key: 'vibe', label: 'Vibe', multi: true, values: VIBE_TAGS,
      match: (r, vals) => {
        if (!vals.size) return true;
        const tags = tagSet(r);
        for (const v of vals) if (tags.has(v)) return true;
        return false;
      },
    },
    {
      key: 'diet', label: 'Diet', multi: true, dynamic: 'diet',
      match: (r, vals) => {
        if (!vals.size) return true;
        const d = dietSet(r);
        // AND across diet selections — picking gluten-free + dairy-free should
        // require both, otherwise the filter is misleading for restrictions.
        for (const v of vals) if (!d.has(v)) return false;
        return true;
      },
    },
    {
      key: 'time', label: 'Time (active)', multi: false,
      values: TIME_BUCKETS.map(t => String(t.value)),
      labelFor: v => (TIME_BUCKETS.find(t => String(t.value) === v) || {}).label || v,
      match: (r, vals) => {
        if (!vals.size) return true;
        const cap = Math.min(...[...vals].map(v => parseInt(v, 10) || 0).filter(n => n > 0));
        if (!isFinite(cap)) return true;
        const t = activeMin(r);
        return t > 0 && t <= cap;
      },
    },
    {
      key: 'difficulty', label: 'Difficulty', multi: true, values: DIFFICULTIES,
      match: (r, vals) => !vals.size || vals.has(r.difficulty || ''),
    },
  ];

  const STORE_KEY = 'hdr-random-filter-v2';

  // ── Storage ─────────────────────────────────────────────────────────
  // State is { facetKey: [v1, v2, ...] }. Stringify-friendly.
  function loadState() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return {};
      const v = JSON.parse(raw);
      return (v && typeof v === 'object') ? v : {};
    } catch { return {}; }
  }
  function saveState(state) {
    try {
      const out = {};
      for (const f of FACETS) {
        const arr = [...(state[f.key] || [])];
        if (arr.length) out[f.key] = arr;
      }
      if (Object.keys(out).length) localStorage.setItem(STORE_KEY, JSON.stringify(out));
      else localStorage.removeItem(STORE_KEY);
    } catch {}
  }

  // ── URL params ──────────────────────────────────────────────────────
  // Multi-value: comma-separated (e.g. ?cuisine=Italian,Chinese).
  // Legacy single-value also supported (?cuisine=Italian).
  // Legacy ?max_min= maps to time.
  function stateFromQuery() {
    const out = {};
    const qs = new URLSearchParams(location.search);
    for (const f of FACETS) {
      const vals = [];
      // Repeated key: ?cuisine=A&cuisine=B
      qs.getAll(f.key).forEach(v => {
        if (!v) return;
        // Comma-split for ?cuisine=A,B
        v.split(',').map(s => s.trim()).filter(Boolean).forEach(s => vals.push(s));
      });
      if (vals.length) out[f.key] = vals;
    }
    // Legacy: ?max_min= maps to time
    if (!out.time) {
      const mx = qs.get('max_min');
      if (mx && /^\d+$/.test(mx)) out.time = [mx];
    }
    return out;
  }

  function queryFromState(state) {
    const qs = new URLSearchParams();
    for (const f of FACETS) {
      const vals = state[f.key];
      if (!vals || !vals.length) continue;
      // Repeated keys read more naturally in URLs than comma-joins.
      for (const v of vals) qs.append(f.key, v);
    }
    return qs;
  }

  // ── Engine ─────────────────────────────────────────────────────────
  function matches(recipe, state) {
    for (const f of FACETS) {
      const vals = state[f.key];
      if (!vals || !vals.length) continue;
      if (!f.match(recipe, new Set(vals))) return false;
    }
    return true;
  }

  function loadEntries() {
    return fetch('data/entries.json').then(r => r.json());
  }

  // ── Path A: query params present → filter and redirect ─────────────
  const hasParams = [...new URLSearchParams(location.search).keys()].length > 0;
  if (hasParams) {
    const state = stateFromQuery();
    document.getElementById('lede').textContent = 'Filtering…';
    document.getElementById('lede').classList.add('loading');
    loadEntries().then(entries => {
      const recipes = entries.filter(e => e.status === 'complete' && e.type === 'recipe');
      const pool = recipes.filter(r => matches(r, state));
      if (!pool.length) {
        document.getElementById('lede').classList.remove('loading');
        document.getElementById('lede').textContent = 'Nothing matches that combination — try loosening the filters.';
        document.getElementById('heading').textContent = 'No match';
        showPicker(state, recipes);
        return;
      }
      saveState(state);
      const pick = pool[Math.floor(Math.random() * pool.length)];
      location.replace(pick.path);
    }).catch(() => location.replace('index.html'));
    return;
  }

  // ── Path B: no params → render the picker ──────────────────────────
  document.getElementById('heading').textContent = 'Random — your call';
  document.getElementById('lede').textContent = 'Pick anything to narrow down. Skip everything for a true wildcard.';
  loadEntries().then(entries => {
    const recipes = entries.filter(e => e.status === 'complete' && e.type === 'recipe');
    showPicker(loadState(), recipes);
  });

  // ── Picker UI ──────────────────────────────────────────────────────
  function showPicker(initialState, recipes) {
    const ui = document.getElementById('filter-ui');
    const filtersEl = document.getElementById('filters');
    const statusEl = document.getElementById('status');
    const goBtn = document.getElementById('go');
    const clearBtn = document.getElementById('clear');
    ui.hidden = false;

    // Resolve dynamic values from data.
    const dynamicValues = { cuisine: new Set(), course: new Set(), diet: new Set() };
    for (const r of recipes) {
      if (r.cuisine) dynamicValues.cuisine.add(r.cuisine);
      if (r.course)  dynamicValues.course.add(r.course);
      for (const d of dietSet(r)) dynamicValues.diet.add(d);
    }

    // Build state — Set per facet for fast toggle.
    const state = {};
    for (const f of FACETS) {
      state[f.key] = new Set(initialState[f.key] || []);
    }

    // Render one facet row.
    function valuesFor(f) {
      if (f.dynamic) return [...dynamicValues[f.dynamic]].sort();
      return f.values || [];
    }

    function renderFacet(f) {
      const row = document.createElement('div');
      row.className = 'filter-row';
      row.innerHTML = `<span class="filter-label">${f.label}${f.multi ? '' : ' <span style="text-transform:none;letter-spacing:.05em;opacity:.7">(pick one)</span>'}</span>`;
      const chipsEl = document.createElement('div');
      chipsEl.className = 'chips';
      chipsEl.dataset.facet = f.key;
      const vals = valuesFor(f);
      for (const v of vals) {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'chip' + (state[f.key].has(v) ? ' is-on' : '');
        b.dataset.value = v;
        b.textContent = f.labelFor ? f.labelFor(v) : v;
        chipsEl.appendChild(b);
      }
      row.appendChild(chipsEl);
      // Click delegate
      chipsEl.addEventListener('click', (e) => {
        const btn = e.target.closest('.chip');
        if (!btn) return;
        const v = btn.dataset.value;
        const sel = state[f.key];
        if (f.multi) {
          if (sel.has(v)) sel.delete(v); else sel.add(v);
        } else {
          // Single-select: toggle off if already selected, else replace
          const wasOn = sel.has(v);
          sel.clear();
          if (!wasOn) sel.add(v);
        }
        // Repaint chips for THIS facet (on/off state)
        chipsEl.querySelectorAll('.chip').forEach(c => {
          c.classList.toggle('is-on', sel.has(c.dataset.value));
        });
        update();
      });
      return row;
    }

    // Mount all facets
    for (const f of FACETS) filtersEl.appendChild(renderFacet(f));

    function snapshot() {
      const out = {};
      for (const f of FACETS) out[f.key] = [...state[f.key]];
      return out;
    }

    function update() {
      const snap = snapshot();
      const n = recipes.filter(r => matches(r, snap)).length;
      const total = recipes.length;
      const filterCount = Object.values(snap).reduce((acc, v) => acc + v.length, 0);
      statusEl.innerHTML = filterCount
        ? `<span class="count">${n}</span> of ${total} ${n === 1 ? 'recipe' : 'recipes'} match · ${filterCount} filter${filterCount === 1 ? '' : 's'}`
        : `<span class="count">${total}</span> recipes — wildcard mode`;
      goBtn.disabled = n === 0;
      saveState(snap);

      // Subtle: dim chips that would yield 0 if added (predictive disable).
      // For each unselected chip, simulate adding it and check pool > 0.
      // Cheap enough at 75 recipes × ~80 chips.
      for (const f of FACETS) {
        const chipsEl = filtersEl.querySelector(`.chips[data-facet="${f.key}"]`);
        if (!chipsEl) continue;
        const sel = state[f.key];
        chipsEl.querySelectorAll('.chip').forEach(c => {
          const v = c.dataset.value;
          if (sel.has(v)) { c.classList.remove('is-disabled'); return; }
          // Simulate: temp-add v, see if any matches remain.
          const probe = { ...snap, [f.key]: f.multi ? [...sel, v] : [v] };
          const ok = recipes.some(r => matches(r, probe));
          c.classList.toggle('is-disabled', !ok);
        });
      }
    }

    goBtn.addEventListener('click', () => {
      const snap = snapshot();
      const pool = recipes.filter(r => matches(r, snap));
      if (!pool.length) return;
      saveState(snap);
      // Persist filter into URL and navigate via the param-path so a back-button
      // returns to the picker with the same selection visible.
      const qs = queryFromState(snap);
      if (qs.toString()) {
        location.replace(`random.html?${qs}`);
      } else {
        const pick = pool[Math.floor(Math.random() * pool.length)];
        location.replace(pick.path);
      }
    });

    clearBtn.addEventListener('click', () => {
      for (const f of FACETS) state[f.key].clear();
      filtersEl.querySelectorAll('.chip').forEach(c => c.classList.remove('is-on'));
      saveState({});
      update();
    });

    update();
  }
})();
</script>
</body>
</html>
