<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random recipe · hd · recipes</title>
<meta name="description" content="Pull a random recipe from hd · recipes.">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='14' fill='%23b8423a'/%3E%3Ctext x='50' y='62' text-anchor='middle' dominant-baseline='central' font-family='EB Garamond, serif' font-size='66' font-weight='700' fill='%23faf6ee'%3E?%3C/text%3E%3C/svg%3E">
<style>
  html, body { margin: 0; padding: 0; background: #faf6ee; color: #2a1f10; font-family: 'EB Garamond', Georgia, serif; }
  main { min-height: 100vh; display: grid; place-items: center; text-align: center; padding: 2rem; }
  .mark { font-size: 3.5rem; color: #b8423a; margin-bottom: .5rem; font-weight: 700; }
  p { font-size: 1.15rem; opacity: .75; }
  a { color: #1f5b8a; }
</style>
</head>
<body>
<main>
  <div>
    <div class="mark">?</div>
    <p>Pulling a recipe…</p>
    <p><a href="/">← back to all recipes</a></p>
  </div>
</main>
<script>
(function () {
  fetch('data/entries.json')
    .then(r => r.json())
    .then(entries => {
      const recipes = entries.filter(e => e.status === 'complete' && e.type === 'recipe');
      if (!recipes.length) { window.location.replace('./'); return; }
      const pick = recipes[Math.floor(Math.random() * recipes.length)];
      window.location.replace(pick.path);
    })
    .catch(() => window.location.replace('./'));
})();
</script>
</body>
</html>
