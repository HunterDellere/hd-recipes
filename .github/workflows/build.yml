name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # nutrition job commits cache updates back
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate content schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run validate

  nutrition:
    name: Refresh USDA nutrition cache (rate-limited)
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Fetch any new USDA records
        env:
          USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
        run: |
          if [ -z "$USDA_API_KEY" ]; then
            echo "USDA_API_KEY not set — skipping nutrition refresh."
            exit 0
          fi
          # Conservative: 100 ids/run, 4s pacing → ~7 min wall time, ~100 req/hr
          # well under the 1000/hr USDA cap. Multiple pushes per hour are safe.
          # Exit 1 (rate-limit) is treated as soft-fail so deploy still ships.
          npm run refresh:nutrition -- --max=100 --pace=4000 || echo "::warning::nutrition refresh hit rate limit; will catch up next run"
      - name: Commit cache if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/_reference/usda-cache.json
          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "USDA cache up to date."
          else
            git commit -m "chore: refresh USDA nutrition cache [skip ci]"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build & check site
    needs: [validate, nutrition]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      (needs.nutrition.result == 'success' || needs.nutrition.result == 'skipped' || needs.nutrition.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run check
      - name: Upload Pages artifact
        # `upload-pages-artifact` always names the artifact `github-pages`,
        # which is what `deploy-pages` expects. Single upload, single name.
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
