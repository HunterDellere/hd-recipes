<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- hd · recipes — app icon (standard)
       Cream card with terra-red serif 'hd' centered.
       Rendered corners: rounded rectangle, safe to mask to a circle at ~85%. -->
