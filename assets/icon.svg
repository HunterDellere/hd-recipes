<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Jiǎoshū · 角書 — app icon (standard)
       Cinnabar seal with cream glyphs stacked like a book spine.
       Rendered corners: rounded rectangle, safe to mask to a circle at ~85%. -->
  <defs>
    <linearGradient id="seal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a01f1f"/>
      <stop offset="55%" stop-color="#8b1a1a"/>
      <stop offset="100%" stop-color="#6e1313"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#seal)"/>
  <!-- Inner frame — scholarly chop -->
  <rect x="34" y="34" width="444" height="444" rx="70" ry="70"
        fill="none" stroke="#f2e8d5" stroke-width="3" stroke-opacity="0.55"/>
  <!-- Stacked glyphs: 角 on top, 書 below -->
  <g font-family="Noto Serif CJK TC, Noto Serif SC, Songti SC, serif"
     font-weight="700" fill="#f2e8d5" text-anchor="middle">
    <text x="256" y="230" font-size="220">角</text>
    <text x="256" y="440" font-size="220">書</text>
  </g>
</svg>
