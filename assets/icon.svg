  <!-- Inner frame — subtle plate edge -->
  <rect x="34" y="34" width="444" height="444" rx="70" ry="70"
        fill="none" stroke="#b8423a" stroke-width="3" stroke-opacity="0.28"/>
  <g font-family="EB Garamond, Garamond, Georgia, 'Times New Roman', serif"
     font-weight="700" fill="#b8423a" text-anchor="middle">
