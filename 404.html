<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — hd · recipes</title>
<meta name="description" content="This page doesn't exist — but plenty of recipes do.">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%23faf6ee'/%3E%3Ctext x='50' y='50' text-anchor='middle' dominant-baseline='central' font-family='EB Garamond, serif' font-size='66' font-weight='700' fill='%23b8423a'%3ER%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/style.css">
<style>
.e404 {
  min-height: calc(100vh - var(--nav-h, 52px));
  display: flex; align-items: center; justify-content: center;
  padding: 4rem 1.5rem;
}
.e404-card { max-width: 540px; text-align: center; }
.e404-num {
  font-family: var(--font-serif); font-size: 8rem; font-weight: 700;
  color: var(--accent); line-height: 1; margin-bottom: 1rem;
  cursor: pointer;
}
.e404-num:hover { color: var(--accent-deep); }
.e404-msg { font-family: var(--font-serif); font-size: 1.4rem; color: var(--ink); margin-bottom: .5rem; }
.e404-sub { color: var(--ink-soft); margin-bottom: 2rem; }
.e404-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
.e404-btn {
  display: inline-block; padding: 10px 22px; border-radius: 999px;
  font-family: var(--font-sans); font-size: 14px; font-weight: 600;
  background: var(--accent); color: #fff; text-decoration: none;
}
.e404-btn:hover { background: var(--accent-deep); text-decoration: none; }
.e404-btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
.e404-btn-ghost:hover { background: var(--accent); color: #fff; }
</style>
</head>
<body>
<nav class="topnav" aria-label="Site">
  <a href="/" class="topnav-brand"><span class="topnav-brand-mark">hd</span><span class="topnav-brand-sep"> · </span><span class="topnav-brand-en">recipes</span></a>
</nav>
<main class="e404" id="main-content">
  <div class="e404-card">
    <div class="e404-num" id="e404-num" title="Tap for a random recipe">404</div>
    <p class="e404-msg">This page hasn't been cooked yet.</p>
    <p class="e404-sub">It may have moved, or never existed. Try the kitchen door instead.</p>
    <div class="e404-actions">
      <a href="/" class="e404-btn">Back to all recipes</a>
      <a href="/random.html" class="e404-btn e404-btn-ghost">Random recipe</a>
    </div>
  </div>
</main>
<script>
document.getElementById('e404-num').addEventListener('click', () => location.href = '/random.html');
</script>
</body>
</html>
